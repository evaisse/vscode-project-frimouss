name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  code-review:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18.x
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Analyze code changes
      id: analyze
      run: |
        echo "Analyzing code changes..."
        
        # Get changed files
        git diff --name-only origin/${{ github.base_ref }}...HEAD > changed_files.txt
        
        # Count changes
        TYPESCRIPT_CHANGES=$(grep "\.ts$" changed_files.txt | wc -l)
        TEST_CHANGES=$(grep "test\.ts$" changed_files.txt | wc -l)
        
        echo "typescript_changes=$TYPESCRIPT_CHANGES" >> $GITHUB_OUTPUT
        echo "test_changes=$TEST_CHANGES" >> $GITHUB_OUTPUT
        
        # Check code quality
        npm run compile 2>&1 | tee compile_check.txt
        COMPILE_STATUS=$?
        
        echo "compile_status=$COMPILE_STATUS" >> $GITHUB_OUTPUT
        
    - name: Post AI review
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const tsChanges = '${{ steps.analyze.outputs.typescript_changes }}';
          const testChanges = '${{ steps.analyze.outputs.test_changes }}';
          const compileStatus = '${{ steps.analyze.outputs.compile_status }}';
          
          let recommendations = [];
          
          if (compileStatus !== '0') {
            recommendations.push('⚠️ Compilation issues detected - please fix TypeScript errors');
          } else {
            recommendations.push('✅ Code compiles successfully');
          }
          
          if (tsChanges > 0 && testChanges === '0') {
            recommendations.push('💡 Consider adding tests for new TypeScript code');
          }
          
          if (testChanges > 0) {
            recommendations.push('✅ Tests included with changes');
          }
          
          const changedFiles = fs.readFileSync('changed_files.txt', 'utf8').trim().split('\n');
          
          const comment = `## 🤖 AI Code Review
          
          ### Summary
          - **TypeScript files changed:** ${tsChanges}
          - **Test files changed:** ${testChanges}
          - **Compilation status:** ${compileStatus === '0' ? '✅ Success' : '❌ Failed'}
          
          ### Changed Files
          ${changedFiles.map(f => `- \`${f}\``).join('\n')}
          
          ### Recommendations
          ${recommendations.map(r => `- ${r}`).join('\n')}
          
          ### AI Assistance Available
          This PR can benefit from GitHub Copilot assistance for:
          - Code quality improvements
          - Test coverage enhancement
          - Documentation updates
          - Bug detection and fixes
          
          ---
          *This review is automated. Use GitHub Copilot for detailed code suggestions.*`;
          
          await github.rest.issues.createComment({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.payload.pull_request.number,
            body: comment
          });
