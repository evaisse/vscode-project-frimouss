name: AI PR Review Assistant

on:
  pull_request_review_comment:
    types: [created]
  pull_request:
    types: [opened, synchronize]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  ai-suggestions:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout PR code
      uses: actions/checkout@v4
      with:
        ref: ${{ github.event.pull_request.head.sha }}
        
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18.x
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Analyze PR for suggestions
      id: analyze
      run: |
        echo "Analyzing PR for AI suggestions..."
        
        # Run linting and compilation checks
        npm run compile 2>&1 | tee compile_output.txt
        COMPILE_EXIT=$?
        
        npm run test-unit 2>&1 | tee test_output.txt
        TEST_EXIT=$?
        
        echo "compile_status=$COMPILE_EXIT" >> $GITHUB_OUTPUT
        echo "test_status=$TEST_EXIT" >> $GITHUB_OUTPUT
        
        # Check for common code patterns that could be improved
        echo "Checking code patterns..."
        
        # Count TODO/FIXME comments
        TODO_COUNT=$(find src -type f -name "*.ts" -exec grep -i "TODO\|FIXME" {} \; | wc -l)
        echo "todo_count=$TODO_COUNT" >> $GITHUB_OUTPUT
        
        # Check for console.log in non-test files (potential debug code)
        DEBUG_COUNT=$(find src -type f -name "*.ts" ! -path "*/test/*" -exec grep "console\.log" {} \; | wc -l)
        echo "debug_count=$DEBUG_COUNT" >> $GITHUB_OUTPUT
        
    - name: Generate AI suggestions
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const compileStatus = '${{ steps.analyze.outputs.compile_status }}';
          const testStatus = '${{ steps.analyze.outputs.test_status }}';
          const todoCount = '${{ steps.analyze.outputs.todo_count }}';
          const debugCount = '${{ steps.analyze.outputs.debug_count }}';
          
          let suggestions = [];
          let warnings = [];
          
          // Check compilation
          if (compileStatus !== '0') {
            warnings.push('⚠️ **Compilation failed** - TypeScript errors need to be fixed');
            suggestions.push('Use GitHub Copilot to help resolve TypeScript compilation errors');
          }
          
          // Check tests
          if (testStatus !== '0') {
            warnings.push('⚠️ **Tests failing** - Please review and fix failing tests');
            suggestions.push('GitHub Copilot can help write or fix test cases');
          }
          
          // Check for TODOs
          if (parseInt(todoCount) > 0) {
            suggestions.push(`📝 Found ${todoCount} TODO/FIXME comment(s) - consider addressing them before merging`);
          }
          
          // Check for debug code
          if (parseInt(debugCount) > 0) {
            warnings.push(`🐛 Found ${debugCount} console.log statement(s) in source code - consider removing debug code`);
          }
          
          // Code quality suggestions
          suggestions.push('💡 Use GitHub Copilot Chat to ask about code improvements');
          suggestions.push('🔍 Request Copilot to review for security vulnerabilities');
          suggestions.push('📚 Ask Copilot to suggest better documentation');
          
          let comment = `## 🤖 AI PR Review Assistant
          
          This PR has been analyzed for quality and potential improvements.
          
          ### Status
          - **Compilation:** ${compileStatus === '0' ? '✅ Passed' : '❌ Failed'}
          - **Tests:** ${testStatus === '0' ? '✅ Passed' : '❌ Failed'}
          - **TODO Comments:** ${todoCount}
          - **Debug Statements:** ${debugCount}
          `;
          
          if (warnings.length > 0) {
            comment += `\n### ⚠️ Warnings\n${warnings.map(w => `- ${w}`).join('\n')}\n`;
          }
          
          comment += `\n### 💡 AI Suggestions\n${suggestions.map(s => `- ${s}`).join('\n')}
          
          ### How to Use AI Assistance
          
          1. **GitHub Copilot Chat**: Ask questions about the code changes
             - \`@workspace How can I improve this code?\`
             - \`@workspace Are there any security issues?\`
             - \`@workspace Suggest better test coverage\`
          
          2. **Copilot Inline**: Get suggestions as you type
             - Hover over code for quick fixes
             - Accept/reject suggestions with keyboard shortcuts
          
          3. **Automated Fixes**: Use the Copilot Autofix workflow
             - Triggered on issues labeled with 'bug'
             - Analyzes problems and suggests solutions
          
          ---
          *This analysis is automated. Use GitHub Copilot for personalized assistance.*`;
          
          await github.rest.issues.createComment({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.payload.pull_request.number,
            body: comment
          });
          
    - name: Upload analysis artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: ai-analysis-results
        path: |
          compile_output.txt
          test_output.txt
        retention-days: 7
